name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test:unit
      # Explicit build = early, clear signal (links-validator runs here) before
      # the heavier browser install. The e2e step rebuilds via its webServer.
      - run: bun run build
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e
